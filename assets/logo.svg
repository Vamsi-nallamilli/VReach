<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 480" width="380" height="480">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&amp;family=Dancing+Script:wght@600&amp;display=swap');
    </style>
  </defs>

  <rect width="380" height="480" fill="#000000"/>

  <!-- R: large white bold letter, font-based, positioned right -->
  <text
    x="105" y="310"
    font-family="'Montserrat','Arial Black','Impact',sans-serif"
    font-size="310"
    font-weight="900"
    fill="#ffffff"
    letter-spacing="-10">R</text>

  <!-- V: blue, large bold letter, positioned left, overlapping R -->
  <text
    x="-8" y="310"
    font-family="'Montserrat','Arial Black','Impact',sans-serif"
    font-size="310"
    font-weight="900"
    fill="#2196F3"
    letter-spacing="-10">V</text>

  <!-- "each..." cursive, bottom-right, small -->
  <text
    x="188" y="390"
    font-family="'Dancing Script','Brush Script MT',cursive"
    font-size="58"
    font-weight="600"
    fill="#ffffff">each...</text>

</svg>
