<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 260" width="260" height="260">
  <rect width="260" height="260" fill="#000"/>

  <!--
    EXACT LOGO RECREATION:
    - Background: pure black
    - R: solid WHITE, no gradient, no stem. 
         Bowl is a thick donut-arc (C-shape open on left).
         Leg kicks diagonally down-right from bottom of bowl.
         The V's right stroke fills the left gap of the R.
    - V: solid #2196F3 blue, drawn ON TOP of R.
         Left stroke: tall, from top-left down to a sharp bottom point.
         Right stroke: from bottom point, kicks up-right at ~45deg, shorter.
    - "each...": white cursive, sits to the bottom-RIGHT of the R leg,
         NOT centered below — offset right, same baseline as R leg bottom.
  -->

  <!-- R: thick arc bowl, open on left side, solid white -->
  <!-- Outer arc path: starts top-center, sweeps right and down, ends bottom-center -->
  <path d="
    M 95,30
    C 95,30 185,30 185,90
    C 185,140 148,155 115,158
    L 130,158
    L 168,210
    L 148,210
    L 110,158
    C 110,158 95,158 95,158
    L 95,140
    C 95,140 155,138 165,90
    C 172,52 138,50 95,50
    Z
  " fill="#ffffff"/>

  <!-- V: blue, on top, sharp angular strokes -->
  <!-- Left stroke of V: top-left to bottom-point -->
  <polygon points="18,30  38,30  95,168  75,168" fill="#2196F3"/>
  <!-- Right stroke of V: bottom-point to upper-right -->
  <polygon points="75,168  95,168  112,118  92,118" fill="#2196F3"/>

  <!-- "each..." — white cursive, bottom-right aligned with R leg end -->
  <text
    x="118" y="228"
    font-family="'Dancing Script','Brush Script MT',cursive"
    font-size="42"
    font-weight="600"
    fill="#ffffff">each...</text>
</svg>
