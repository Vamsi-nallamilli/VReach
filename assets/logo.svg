<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="200" height="220">
  <rect width="200" height="220" fill="#000"/>

  <!--
    LOGO ANALYSIS:
    - R: NO vertical stem. Just a large circular bowl (open on left) + diagonal leg.
      The V's right stroke visually acts as the R's left edge.
    - V: Blue, tall. Left stroke goes top-left to bottom-center.
           Right stroke goes bottom-center up-right (shorter, kicks up).
    - V sits ON TOP of R. They overlap at the bottom-center point.
    - "each..." cursive sits bottom-right, completing the word "Reach"
  -->

  <!-- R: bowl only (no left stem) — open circle arc + leg -->
  <!-- Bowl: a thick C-shape / open circle facing left -->
  <path d="
    M 72 20
    C 72 20, 148 20, 148 68
    C 148 108, 108 118, 80 118
    L 80 100
    C 108 100, 128 90, 128 68
    C 128 44, 96 40, 72 40
    Z
  " fill="#ffffff"/>

  <!-- R leg: diagonal kick from mid-right of bowl downward-right -->
  <path d="
    M 108 112
    L 120 112
    L 158 168
    L 146 168
    Z
  " fill="#ffffff"/>

  <!-- V: blue, drawn ON TOP -->
  <!-- Left stroke: top-left down to bottom point -->
  <polygon points="10,20  28,20  72,148  54,148" fill="#2196F3"/>
  <!-- Right stroke: bottom point up to mid-right -->
  <polygon points="54,148  72,148  86,108  68,108" fill="#2196F3"/>

  <!-- "each..." cursive, bottom-right -->
  <text
    x="82" y="200"
    font-family="'Dancing Script','Brush Script MT',cursive"
    font-size="38"
    font-weight="600"
    fill="#ffffff"
    opacity="0.92">each...</text>
</svg>
