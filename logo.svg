<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 200" width="220" height="200">
  <!-- Black background -->
  <rect width="220" height="200" fill="#000000"/>

  <!-- V shape (blue) - two diagonal strokes forming a V -->
  <!-- Left stroke of V: top-left down to bottom center -->
  <polygon points="18,20 38,20 90,145 70,145" fill="#2196f3"/>
  <!-- Right stroke of V: bottom center up to top-right area -->
  <polygon points="70,145 90,145 108,95 88,95" fill="#2196f3"/>

  <!-- R shape (white) - overlapping the V -->
  <!-- R vertical stem -->
  <rect x="82" y="20" width="22" height="130" fill="white"/>
  <!-- R bowl (top bump) -->
  <path d="M104,20 Q160,20 160,62 Q160,104 104,104 L104,85 Q138,85 138,62 Q138,39 104,39 Z" fill="white"/>
  <!-- R leg (diagonal going bottom-right, crossing over V) -->
  <polygon points="104,100 126,100 168,150 146,150" fill="white"/>

  <!-- "each..." text in cursive white, positioned at bottom-right of R -->
  <text x="118" y="168"
    font-family="'Dancing Script', 'Brush Script MT', cursive"
    font-size="28"
    font-weight="600"
    fill="white"
    letter-spacing="1">each...</text>
</svg>
